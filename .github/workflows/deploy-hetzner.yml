name: Deploy Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hetzner
  cancel-in-progress: false

env:
  DEPLOY_DIR: ${{ vars.HETZNER_APP_DIR || '/opt/blitz' }}
  DEPLOY_HOST: ${{ vars.HETZNER_COLLAB_HOST || '127.0.0.1' }}
  DEPLOY_PORT: ${{ vars.HETZNER_COLLAB_PORT || '8790' }}
  MAX_CONNECTIONS: ${{ vars.HETZNER_COLLAB_MAX_CONNECTIONS || '200' }}
  MAX_CONNECTIONS_PER_IP: ${{ vars.HETZNER_COLLAB_MAX_CONNECTIONS_PER_IP || '20' }}
  MAX_MESSAGES_PER_MINUTE: ${{ vars.HETZNER_COLLAB_MAX_MESSAGES_PER_MINUTE || '120' }}
  MAX_PEERS_PER_ROOM: ${{ vars.HETZNER_COLLAB_MAX_PEERS_PER_ROOM || '20' }}
  MAX_ROOM_MESSAGES_PER_MINUTE: ${{ vars.HETZNER_COLLAB_MAX_ROOM_MESSAGES_PER_MINUTE || '600' }}
  MAX_ROOMS: ${{ vars.HETZNER_COLLAB_MAX_ROOMS || '100' }}
  SSH_PORT: ${{ vars.HETZNER_SSH_PORT || '22' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck relay
        run: npx tsc -p tsconfig.mcp.json

      - name: Pack release
        run: |
          set -euo pipefail
          mkdir -p .deploy/blitz
          cp -R mcp package.json package-lock.json tsconfig.mcp.json .deploy/blitz/
          tar -C .deploy -czf blitz-${GITHUB_SHA}.tar.gz blitz

      - name: Configure SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/hetzner_deploy
          chmod 600 ~/.ssh/hetzner_deploy
          ssh-keyscan -p "$SSH_PORT" "${{ secrets.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload release
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/hetzner_deploy -p "$SSH_PORT" "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" \
            "mkdir -p '$DEPLOY_DIR/releases/${GITHUB_SHA}' '$DEPLOY_DIR/shared'"
          scp -i ~/.ssh/hetzner_deploy -P "$SSH_PORT" "blitz-${GITHUB_SHA}.tar.gz" \
            "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}:$DEPLOY_DIR/releases/${GITHUB_SHA}/release.tar.gz"

      - name: Activate release
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/hetzner_deploy -p "$SSH_PORT" "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" \
            "DEPLOY_DIR='$DEPLOY_DIR' GITHUB_SHA='$GITHUB_SHA' DEPLOY_HOST='$DEPLOY_HOST' DEPLOY_PORT='$DEPLOY_PORT' MAX_CONNECTIONS='$MAX_CONNECTIONS' MAX_CONNECTIONS_PER_IP='$MAX_CONNECTIONS_PER_IP' MAX_MESSAGES_PER_MINUTE='$MAX_MESSAGES_PER_MINUTE' MAX_PEERS_PER_ROOM='$MAX_PEERS_PER_ROOM' MAX_ROOM_MESSAGES_PER_MINUTE='$MAX_ROOM_MESSAGES_PER_MINUTE' MAX_ROOMS='$MAX_ROOMS' bash -s" <<'REMOTE'
          set -euo pipefail

          if [ "$(id -u)" -eq 0 ]; then
            SUDO=""
          else
            SUDO="sudo"
          fi

          RELEASE_DIR="$DEPLOY_DIR/releases/$GITHUB_SHA"
          tar -xzf "$RELEASE_DIR/release.tar.gz" -C "$RELEASE_DIR" --strip-components=1
          cd "$RELEASE_DIR"
          npm ci

          ln -sfn "$RELEASE_DIR" "$DEPLOY_DIR/current"

          $SUDO tee /etc/systemd/system/blitz-collab.service >/dev/null <<SERVICE
          [Unit]
          Description=Blitz collaboration relay
          After=network.target

          [Service]
          Type=simple
          WorkingDirectory=$DEPLOY_DIR/current
          Environment=NODE_ENV=production
          Environment=BLITZ_COLLAB_HOST=$DEPLOY_HOST
          Environment=BLITZ_COLLAB_PORT=$DEPLOY_PORT
          Environment=BLITZ_COLLAB_MAX_CONNECTIONS=$MAX_CONNECTIONS
          Environment=BLITZ_COLLAB_MAX_CONNECTIONS_PER_IP=$MAX_CONNECTIONS_PER_IP
          Environment=BLITZ_COLLAB_MAX_MESSAGES_PER_MINUTE=$MAX_MESSAGES_PER_MINUTE
          Environment=BLITZ_COLLAB_MAX_PEERS_PER_ROOM=$MAX_PEERS_PER_ROOM
          Environment=BLITZ_COLLAB_MAX_ROOM_MESSAGES_PER_MINUTE=$MAX_ROOM_MESSAGES_PER_MINUTE
          Environment=BLITZ_COLLAB_MAX_ROOMS=$MAX_ROOMS
          ExecStart=$(command -v npm) run collab:relay
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          SERVICE

          $SUDO systemctl daemon-reload
          $SUDO systemctl enable blitz-collab.service
          $SUDO systemctl restart blitz-collab.service
          $SUDO systemctl --no-pager --full status blitz-collab.service

          find "$DEPLOY_DIR/releases" -mindepth 1 -maxdepth 1 -type d \
            | sort \
            | head -n -5 \
            | xargs -r rm -rf
          REMOTE

      - name: Health check
        run: |
          set -euo pipefail
          # The relay runs under tsx, which compiles on startup, so the socket
          # isn't bound the instant systemctl returns. Retry until it answers.
          ssh -i ~/.ssh/hetzner_deploy -p "$SSH_PORT" "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" \
            "for _ in \$(seq 1 30); do \
               curl -fsS http://127.0.0.1:$DEPLOY_PORT/__blitz/collaboration/status && exit 0; \
               sleep 1; \
             done; \
             echo 'collaboration relay did not become healthy within 30s' >&2; exit 1"
