name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup LLVM
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test
