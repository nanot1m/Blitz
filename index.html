<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Blitz</title>
  </head>
  <body>
    <canvas id="blitz-canvas" aria-label="Blitz WebGPU canvas"></canvas>
    <div id="tool-island" role="toolbar" aria-label="Canvas tools">
      <details id="file-menu">
        <summary aria-label="Scene file" title="Scene file">
          <i data-lucide="folder-open" aria-hidden="true"></i>
        </summary>
        <div class="file-menu-content" role="group" aria-label="Scene file actions">
          <details id="open-scene-menu" class="scene-action-menu">
            <summary id="open-scene" aria-label="Open scene" title="Open scene">
              <i data-lucide="folder-open" aria-hidden="true"></i>
            </summary>
            <div class="scene-action-popup open-scene-popup" role="menu" aria-label="Open scene">
              <button id="new-scene-file" class="scene-menu-command" type="button" role="menuitem">
                New File
              </button>
              <button id="choose-scene-file" class="scene-menu-command" type="button" role="menuitem">
                Open File
              </button>
              <div id="recent-scenes-divider" class="scene-menu-divider" hidden></div>
              <div id="recent-scenes" class="recent-scenes" role="group" aria-label="Recent scenes" hidden></div>
            </div>
          </details>
          <details id="save-scene-menu" class="scene-action-menu">
            <summary id="save-scene" aria-label="Save scene" title="Save scene">
              <i data-lucide="save" aria-hidden="true"></i>
            </summary>
            <div class="scene-action-popup save-scene-popup" role="menu" aria-label="Save scene">
              <button id="save-scene-current" class="scene-menu-command" type="button" role="menuitem">
                Save
              </button>
              <button id="save-scene-as" class="scene-menu-command" type="button" role="menuitem">
                Save As
              </button>
              <div class="scene-menu-divider"></div>
              <label class="scene-menu-option">
                <input id="save-current-viewpoint" type="checkbox" />
                <span>Save current viewpoint</span>
              </label>
            </div>
          </details>
        </div>
      </details>
      <span class="tool-divider" aria-hidden="true"></span>
      <details id="shape-menu">
        <summary aria-label="Add shape" title="Add shape">
          <i data-lucide="shapes" aria-hidden="true"></i>
        </summary>
        <div class="shape-menu-content" role="group" aria-label="Shape tools">
          <button id="add-rect" type="button" aria-label="Add rectangle" title="Add rectangle">
            <i data-lucide="square" aria-hidden="true"></i>
          </button>
          <button id="add-circle" type="button" aria-label="Add circle" title="Add circle">
            <i data-lucide="circle" aria-hidden="true"></i>
          </button>
          <button id="add-oval" type="button" aria-label="Add oval" title="Add oval">
            <i data-lucide="ellipse" aria-hidden="true"></i>
          </button>
          <button id="add-triangle" type="button" aria-label="Add triangle" title="Add triangle">
            <i data-lucide="triangle" aria-hidden="true"></i>
          </button>
          <button id="add-text" type="button" aria-label="Add text" title="Add text">
            <i data-lucide="type" aria-hidden="true"></i>
          </button>
        </div>
      </details>
      <button id="stress-test" type="button" aria-label="Spawn 20,000 slides" title="Spawn 20,000 slides">
        <i data-lucide="layout-grid" aria-hidden="true"></i>
      </button>
      <span class="tool-divider" aria-hidden="true"></span>
      <button id="send-to-back" type="button" aria-label="Send to back" title="Send to back" disabled>
        <i data-lucide="send-to-back" aria-hidden="true"></i>
      </button>
      <button id="bring-to-front" type="button" aria-label="Bring to front" title="Bring to front" disabled>
        <i data-lucide="bring-to-front" aria-hidden="true"></i>
      </button>
      <span class="tool-divider" aria-hidden="true"></span>
      <button id="delete-selected" type="button" aria-label="Delete selected" title="Delete selected" disabled>
        <i data-lucide="trash-2" aria-hidden="true"></i>
      </button>
      <span class="tool-divider" aria-hidden="true"></span>
      <button id="toggle-stats" type="button" aria-label="Stats for nerds" title="Stats for nerds" aria-pressed="false">
        <i data-lucide="activity" aria-hidden="true"></i>
      </button>
      <button id="toggle-debugger" type="button" aria-label="Selected entity debugger" title="Selected entity debugger" aria-pressed="false">
        <i data-lucide="bug" aria-hidden="true"></i>
      </button>
      <button id="open-mcp-settings" type="button" aria-label="MCP bridge settings" title="MCP bridge: Disconnected">
        <i data-lucide="settings" aria-hidden="true"></i>
      </button>
    </div>
    <div id="style-island" role="toolbar" aria-label="Selected item styles" hidden>
      <div id="selected-geometry-controls" class="selected-style-group">
        <label class="style-control">
          <span>Fill</span>
          <input id="selected-fill" type="color" aria-label="Fill color" />
          <input
            id="selected-fill-opacity"
            class="style-opacity"
            type="range"
            min="0"
            max="1"
            step="0.01"
            aria-label="Fill opacity"
          />
        </label>
        <span class="style-divider" aria-hidden="true"></span>
        <div class="selected-stroke-controls">
          <label class="style-control">
            <span>Stroke</span>
            <input id="selected-stroke" type="color" aria-label="Stroke color" />
            <input
              id="selected-stroke-opacity"
              class="style-opacity"
              type="range"
              min="0"
              max="1"
              step="0.01"
              aria-label="Stroke opacity"
            />
          </label>
          <label class="style-control style-width-control">
            <span>Width</span>
            <input
              id="selected-stroke-width"
              type="number"
              min="0"
              max="64"
              step="0.5"
              aria-label="Stroke width"
            />
          </label>
        </div>
      </div>
      <span id="selected-mixed-divider" class="style-divider" aria-hidden="true" hidden></span>
      <label id="selected-text-controls" class="style-control" hidden>
        <span>Text</span>
        <input id="selected-text-color" type="color" aria-label="Text color" />
        <input
          id="selected-text-opacity"
          class="style-opacity"
          type="range"
          min="0"
          max="1"
          step="0.01"
          aria-label="Text opacity"
        />
      </label>
    </div>
    <aside id="debugger-island" aria-label="Selected entity components" hidden>
      <div class="debugger-heading">
        <span>Selected entity</span>
        <span id="debugger-entity-id"></span>
      </div>
      <div id="debugger-components"></div>
    </aside>
    <section id="empty-state" class="empty-state" aria-labelledby="empty-state-title">
      <div class="empty-state-card">
        <h1 id="empty-state-title">Start a new canvas</h1>
        <p>
          <span class="empty-primary-text">Add a new item</span>
          from the shape menu or
          <button id="empty-open-file" class="empty-inline-action" type="button">open a file</button>.
        </p>
        <section id="empty-recent-section" class="empty-state-section" aria-labelledby="empty-recent-title" hidden>
          <h2 id="empty-recent-title">Recent files</h2>
          <div id="empty-recent-scenes" class="empty-recent-scenes"></div>
        </section>
        <section class="empty-state-section" aria-labelledby="empty-template-title">
          <h2 id="empty-template-title">Start from a template</h2>
          <button id="empty-demo-template" class="template-card" type="button">
            <span class="template-preview" aria-hidden="true">
              <span class="template-sidebar"></span>
              <span class="template-heading"></span>
              <span class="template-line"></span>
              <span class="template-block template-block-left"></span>
              <span class="template-block template-block-right"></span>
            </span>
            <span>Demo slide</span>
          </button>
        </section>
      </div>
    </section>
    <div id="fallback" role="status"></div>
    <div id="zoom-indicator" role="status" aria-label="Zoom level"></div>
    <div id="stats-panel" role="status" aria-label="Stats for nerds" hidden><div id="stats-body"></div></div>
    <dialog id="mcp-settings-dialog" aria-labelledby="mcp-settings-title">
      <form id="mcp-settings-form">
        <div class="dialog-heading">
          <div>
            <h2 id="mcp-settings-title">Local MCP bridge</h2>
            <p>Connect this canvas to the MCP server running on your computer.</p>
          </div>
          <button id="close-mcp-settings" class="dialog-close" type="button" aria-label="Close settings">×</button>
        </div>
        <label>
          Secure WebSocket URL
          <input
            id="mcp-bridge-url"
            name="bridge-url"
            type="url"
            value="wss://127.0.0.1:8787"
            spellcheck="false"
            required
          />
        </label>
        <label>
          Bridge token
          <input
            id="mcp-bridge-token"
            name="bridge-token"
            type="password"
            minlength="24"
            autocomplete="off"
            required
          />
        </label>
        <p class="settings-note">The URL is saved locally. The token is retained only for this browser tab.</p>
        <div class="bridge-status-row">
          <span id="mcp-bridge-status" data-state="disconnected">Disconnected</span>
        </div>
        <div class="dialog-actions">
          <button id="disconnect-mcp-bridge" class="secondary-action" type="button">Disconnect</button>
          <button class="primary-action" type="submit">Connect</button>
        </div>
      </form>
    </dialog>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
